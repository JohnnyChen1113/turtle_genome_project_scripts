# circos.conf

# Configuration file for Circos to plot only the karyotype layer.

# Set the image parameters
<image>
    dir   = .
    file  = circos.png
    png   = yes
    svg   = no
    radius = 1500p
    background = white
</image>

# Karyotype file path, modify the path to point to your actual karyotype file
karyotype = primary.karyotype.txt

<ideogram>
    <spacing>
        default = 0.005r
    </spacing>

    radius           = 0.85r
    thickness        = 50p
    fill             = yes
    stroke_color     = black
    stroke_thickness = 1p

    show_label       = yes
    label_font       = default
    label_radius     = dims(ideogram,radius_outer) + 100p
    label_size       = 36
    label_parallel   = yes
    label_case       = upper
</ideogram>

# The chromosomes to display

<ticks>
    radius           = 1r + 0.02r
    orientation      = out
    label_multiplier = 1e-6
    label_font       = default
    label_size       = 20p
    color            = black
    thickness        = 2p

    <tick>
        spacing        = 10u
        size           = 15p
        label_offset   = 2p
        format         = %d Mb
        label_size     = 20p
        label_offset   = 5p
    </tick>

    <tick>
        spacing        = 50u
        size           = 25p
        label_offset   = 10p
        format         = %d Mb
        label_size     = 30p
    </tick>
</ticks>

# No data tracks for now, only karyotype layer
<plots>
</plots>

# Links - no links defined for this configuration
<links>
</links>

